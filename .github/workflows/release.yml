name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # to create GitHub Releases
  id-token: write   # for npm provenance attestation

jobs:
  release:
    name: Publish to npm + create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # ── Verify tag matches package.json version ────────────────────────────
      - name: Check tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "✅ Tag $TAG_VERSION matches package.json"

      # ── Run full test suite before publishing ──────────────────────────────
      - name: Run tests
        run: npm run test:ci

      # ── Publish to npm with provenance attestation ─────────────────────────
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Extract changelog section for this version ─────────────────────────
      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract lines between this version heading and the next
          NOTES=$(awk "/^## ${VERSION}|^## v${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "notes<<NOTES_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "NOTES_EOF" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OMSF ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
